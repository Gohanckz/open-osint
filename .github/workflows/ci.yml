name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hilo
          POSTGRES_PASSWORD: hilo
          POSTGRES_DB: hilo
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://hilo:hilo@localhost:5432/hilo?schema=public
      DIRECT_URL: postgresql://hilo:hilo@localhost:5432/hilo?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-secret-placeholder-32-characters-ok
      IP_HASH_SALT: ci-salt-placeholder-32-characters-ok
      COREPACK_ENABLE_STRICT: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
